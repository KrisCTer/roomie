server:
  port: 8085
  servlet:
    context-path: /contract

spring:
  application:
    name: contract-service

  cloud:
    openfeign:
      lazy-attributes-resolution: true
      client:
        config:
          billing-service:
            url: http://localhost:8086/billing
          file-service:
            url: http://localhost:8088/file
          profile-service:
            url: http://localhost:8082/profile
          property-service:
            url: http://localhost:8083/property
  data:
    mongodb:
      uri: mongodb://admin:${MONGO_PASSWORD:${MONGO_ROOT_PASSWORD:}}@${MONGO_HOST:100.96.78.62}:${MONGO_PORT:27017}/roomie_contract?authSource=admin
    redis:
      host: ${REDIS_HOST:100.96.78.62}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  eureka:
    client:
      service-url:
        defaultZone: http://eureka-server:8761/eureka
      register-with-eureka: true
      fetch-registry: true

  kafka:
    bootstrap-servers: ${KAFKA_HOST:100.96.78.62}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: booking-service
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
    listener:
      ack-mode: MANUAL_IMMEDIATE
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    type: redis

digital:
  signature:
    secret: ${DIGITAL_SIGNATURE_SECRET:}

contract:
  cache-ttl-seconds: 300
  lock-ttl-seconds: 30
  template-type: FULL

app:
  services:
    properties: http://localhost:8083/property
    files: http://localhost:8088/file
    profile: http://localhost:8082/profile
    billing: http://localhost:8086/billing


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
