server:
  port: 8089
  servlet:
    context-path: /chat

spring:
  application:
    name: chat-service

  devtools:
    livereload:
      enabled: false

  cloud:
    openfeign:
      lazy-attributes-resolution: true
      client:
        config:
          identity-service:
            url: http://localhost:8080/identity
          profile-service:
            url: http://localhost:8082/profile
  data:
    mongodb:
      uri: mongodb://admin:${MONGO_PASSWORD:${MONGO_ROOT_PASSWORD:}}@localhost:27017/roomie_chat?authSource=admin
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

app:
  services:
    profile: http://localhost:8082/profile
    identity: http://localhost:8080/identity
