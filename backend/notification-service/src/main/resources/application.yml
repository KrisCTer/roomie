server:
  port: 8090
  servlet:
    context-path: /notification

spring:
  config:
    import:
      - optional:file:../../infra/.env[.properties]
      - optional:file:infra/.env[.properties]
  application:
    name: notification-service

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://admin:${MONGO_PASSWORD:${MONGO_ROOT_PASSWORD:}}@${MONGO_HOST:100.96.78.62}:${MONGO_PORT:27017}/roomie_notification?authSource=admin
      database: roomie_notification

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_HOST:100.96.78.62}:${KAFKA_PORT:9092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        # Important: Don't use JsonDeserializer with type headers
        spring.json.use.type.headers: false
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      ack-mode: MANUAL

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 5000
          connectiontimeout: 5000
          writetimeout: 5000

# Notification Configuration
notification:
  email:
    enabled: true
    from: noreply@roomie.com
  websocket:
    enabled: true
  cleanup:
    enabled: true
    retention-days: 90
  default-language: vi

# Actuator Configuration
management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.roomie.services.notification_service: DEBUG
    org.springframework.kafka: INFO
    org.springframework.messaging: DEBUG
    org.springframework.web.socket: DEBUG


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
