server:
  port: 8091
  servlet:
    context-path: /ai

spring:
  config:
    import:
      - optional:file:../../infra/.env[.properties]
      - optional:file:infra/.env[.properties]
  application:
    name: ai-service

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://admin:${MONGO_PASSWORD:${MONGO_ROOT_PASSWORD:}}@${MONGO_HOST:100.96.78.62}:${MONGO_PORT:27017}/roomie_ai?authSource=admin
      database: roomie_ai

# ? Gemini API Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.roomie.services.ai_service: DEBUG
    org.springframework.web: DEBUG


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
