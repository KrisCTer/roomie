server:
  port: 8086
  servlet:
    context-path: /billing

spring:
  config:
    import:
      - optional:file:../../infra/.env[.properties]
      - optional:file:infra/.env[.properties]
  application:
    name: billing-service

  cloud:
    openfeign:
      lazy-attributes-resolution: true
      client:
        config:
          contract-service:
            url: http://localhost:8085/contract
          file-service:
            url: http://localhost:8088/file
          property-service:
            url: http://localhost:8083/property
  data:
    mongodb:
      uri: mongodb://admin:${MONGO_PASSWORD:${MONGO_ROOT_PASSWORD:}}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/roomie_billing?authSource=admin

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 300000

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: billing-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

billing:
  overdue-check-cron: "0 0 3 * * *"
  validation:
    max-electricity-consumption: 10000 # kWh
    max-water-consumption: 1000
  # Payment Configuration
  payment:
    momo:
      partnerCode: ${MOMO_PARTNER_CODE:}
      accessKey: ${MOMO_ACCESS_KEY:}
      secretKey: ${MOMO_SECRET_KEY:}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      returnUrl: ${MOMO_RETURN_URL:http://localhost:3000/payment/return}
      notifyUrl: ${MOMO_NOTIFY_URL:http://localhost:8086/billing/webhook/momo}

    bank:
      code: "VCB" # Mã ngân hàng (VCB = Vietcombank)
      account: "1234567890" # Số tài khoản
      name: "ROOMIE TECHNOLOGIES LTD" # Tên chủ tài khoản
ocr:
  tesseract:
    datapath: /usr/share/tesseract-ocr/4.00/tessdata
  confidence-threshold: 0.7
  google-vision:
    enabled: false
    project-id: roomie-project
    credentials-path: /path/to/credentials.json

app:
  services:
    contract: http://localhost:8085/contract
    property: http://localhost:8083/property
    files: http://localhost:8088/file


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
